<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting...</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class = "main-page">
    <p id = "animated-cafe-name"></p>
    <dotlottie-wc src="https://lottie.host/f6e37875-1ee3-4fa1-8d87-c7597bb157e6/LMlSmM19U6.json" 
  style="width: 300px;height: 300px" speed="2" autoplay loop></dotlottie-wc>
  </div>

  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@0.6.2/dist/dotlottie-wc.js" type="module"></script>


  <script>
    sessionStorage.setItem("cameFromIndex3", "true");

    const title = document.getElementById("animated-cafe-name");
    const letters = ['O','v','e','r','C','a','f','f','e','i','n','a','t','e','d'];
    letters.forEach((char, index) => {
        let newLetter = document.createElement('span');
        newLetter.textContent = char;
        newLetter.style.animationDelay = `${index * 0.15}s`;
        title.appendChild(newLetter);
    });

    const delayPerLetter = 150;
    const totalDelay = letters.length * delayPerLetter + 1000;

    window.onload = function () {
        setTimeout(() => {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const orientation = width > height ? "landscape" : "portrait";

            if (width <= 430) {
                window.location.href = "index2.html";
            } else if (width >= 750){
                window.location.href = "index1.html";
            } 
        }, totalDelay);
    };


  </script>
  

</body>
</html>
